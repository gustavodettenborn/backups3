#!/bin/bash

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
ENV_FILE="$SCRIPT_DIR/.env"

if [ -f "$ENV_FILE" ]; then
	# shellcheck disable=SC1090
	source "$ENV_FILE"
fi

BACKUP_HOME="${BACKUP_HOME:-$HOME/developer/backups3}"
BACKUP_LOG_DIR="${BACKUP_LOG_DIR:-$BACKUP_HOME/logs}"
BACKUP_LOCK_FILE="${BACKUP_LOCK_FILE:-$BACKUP_LOG_DIR/backup-gdrive.lock}"
BACKUP_WRAPPER_LOG="${BACKUP_WRAPPER_LOG:-$BACKUP_LOG_DIR/backup-wrapper.log}"
BACKUP_GDRIVE_LOG="${BACKUP_GDRIVE_LOG:-$BACKUP_LOG_DIR/backup-gdrive.log}"
BACKUP_LAST_OUTPUT="${BACKUP_LAST_OUTPUT:-$BACKUP_LOG_DIR/backup-last-output.log}"
BACKUP_NOTIFIER="${BACKUP_NOTIFIER:-$BACKUP_HOME/backup-notifier.sh}"
BACKUP_GDRIVE_SCRIPT="${BACKUP_GDRIVE_SCRIPT:-$BACKUP_HOME/backup-gdrive.sh}"
BACKUP_ICON_PATH="${BACKUP_ICON_PATH:-$BACKUP_HOME/images/backup.png}"

AUTH_ERROR_PATTERN="${AUTH_ERROR_PATTERN:-(401|403|invalid_grant|authorization failed|failed to refresh token|token has been revoked|access_token_expired|invalid credentials|googleapi: Error 401)}"
NOTIFY_TIMEOUT_SECONDS="${NOTIFY_TIMEOUT_SECONDS:-12}"
TRAY_TEXT="${TRAY_TEXT:-Backup Google Drive em execucao}"
TRAY_ALWAYS_ON_TEXT="${TRAY_ALWAYS_ON_TEXT:-Backup Google Drive ativo}"
BACKUP_LOOP_INTERVAL_SECONDS="${BACKUP_LOOP_INTERVAL_SECONDS:-21600}"
